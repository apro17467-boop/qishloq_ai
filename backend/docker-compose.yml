services:
  postgres:
    image: postgres:16-alpine
    container_name: qishloq-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: qishloq_ai_db
      POSTGRES_USER: qishloq_user
      POSTGRES_PASSWORD: qishloq_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
